services:
  bot:
    build: .
    container_name: whimsy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - DATABASE_URL=postgres://${POSTGRES_USER:-whimsy}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-whimsy}
      - POSTGRES_URL=postgres://${POSTGRES_USER:-whimsy}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-whimsy}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-whimsy}
      - POSTGRES_USER=${POSTGRES_USER:-whimsy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_SSL=false
      - AUTO_MIGRATE=true
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - LAVALINK_NODES_FILE=lavalink/nodes.json
      - PORT=3000
      - WEB_HOST=0.0.0.0
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - whimsy-network

  lavalink:
    profiles:
      - local-lavalink
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: whimsy-lavalink
    restart: unless-stopped
    environment:
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
    networks:
      - whimsy-network

  db:
    image: postgres:15-alpine
    container_name: whimsy-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-whimsy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-whimsy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whimsy-network

networks:
  whimsy-network:
    driver: bridge

volumes:
  postgres_data:
